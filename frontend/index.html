        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" onclick="mostrarAba('rec', this)" role="tab">
                🪶 &nbsp; Consultar Grimório
            </button>
            <button class="tab-btn" onclick="mostrarAba('clf', this)" role="tab">
                🔮 &nbsp; Invocar Oráculo
            </button>
        </nav>

        <div id="panel-rec" class="panel active" role="tabpanel">
            <div class="grimoire">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>

                <label class="field-label" for="query">Título ou Autor — deixe o corvo guiar sua busca</label>
                <input class="ink-input" id="query" type="text" placeholder="ex: Harry Potter · Stephen King · O Hobbit..." autocomplete="off">

                <button class="spell-btn" id="btn-buscar" onclick="buscar()">
                    ✦ &nbsp; Invocar Tomos Similares &nbsp; ✦
                </button>
            </div>
            <div id="resultado-rec" class="result-section"></div>
        </div>

        <div id="panel-clf" class="panel" role="tabpanel">
          <div class="grimoire">
              <div class="corner tl"></div><div class="corner tr"></div>
              <div class="corner bl"></div><div class="corner br"></div>

              <p class="instruction-text">
                  Sussurre as estatísticas conhecidas para que o oráculo preveja o impacto deste tomo no mundo dos mortais.
              </p>

              <div class="field-row">
                  <div class="field-group">
                      <label class="field-label" for="rating">Avaliação (0–5) <span class="required">*</span></label>
                      <input class="ink-input" id="rating" type="number" placeholder="ex: 4.50" min="0" max="5" step="0.01">
                  </div>
                  <div class="field-group">
                      <label class="field-label" for="count">Nº de Avaliações <span class="required">*</span></label>
                      <input class="ink-input" id="count" type="number" placeholder="ex: 12000" min="1">
                  </div>
                  <div class="field-group">
                      <label class="field-label" for="pages">Nº de Páginas <span class="optional">(Opcional)</span></label>
                      <input class="ink-input" id="pages" type="number" placeholder="Padrão: 300" min="1">
                  </div>
              </div>

              <button class="spell-btn" id="btn-clf" onclick="classificar()">
                  ✦ &nbsp; Revelar a Popularidade &nbsp; ✦
              </button>
          </div>
          <div id="resultado-clf" class="result-section"></div>
      </div>
